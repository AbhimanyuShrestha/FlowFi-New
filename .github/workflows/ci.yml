name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flowfi_test
          POSTGRES_USER: flowfi
          POSTGRES_PASSWORD: flowfi_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      ConnectionStrings__Database: "Host=localhost;Database=flowfi_test;Username=flowfi;Password=flowfi_test_password"
      Jwt__Secret: "ci-test-secret-min-32-chars-long!!"
      Jwt__Issuer: "flowfi-api"
      Jwt__Audience: "flowfi-app"
      Redis__ConnectionString: "localhost:6379"
      ASPNETCORE_ENVIRONMENT: Test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore -c Release

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Apply migrations
        run: |
          dotnet ef database update \
            --project src/FlowFi.Infrastructure \
            --startup-project src/FlowFi.API \
            --no-build

      - name: Run tests
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=results.trx" --results-directory ./TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults/*.trx

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t flowfi-api:ci .

      - name: Smoke test container starts
        run: |
          docker run -d --name flowfi-test \
            -e ConnectionStrings__Database="Host=host.docker.internal;Database=flowfi;Username=flowfi;Password=test" \
            -e Jwt__Secret="ci-test-secret-min-32-chars-long!!" \
            -e Jwt__Issuer="flowfi-api" \
            -e Jwt__Audience="flowfi-app" \
            -e Redis__ConnectionString="host.docker.internal:6379" \
            -p 8080:8080 \
            flowfi-api:ci || true
          sleep 3
          docker logs flowfi-test
          docker rm -f flowfi-test || true
