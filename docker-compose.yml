services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowfi
      POSTGRES_USER: flowfi
      POSTGRES_PASSWORD: flowfi_dev_password
    ports:
      - "5435:5432" # Changed to 5435 to avoid conflict with host Postgres on 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U flowfi -d flowfi" ]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
