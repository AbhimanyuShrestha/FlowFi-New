services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowfi
      POSTGRES_USER: flowfi
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "3000:8080"
    environment:
      ConnectionStrings__Database: "Host=postgres;Database=flowfi;Username=postgres;Password=postgres"
      Jwt__Secret: "dev-secret-min-32-chars-long-here!!"
      Jwt__Issuer: "flowfi-api"
      Jwt__Audience: "flowfi-app"
      Redis__ConnectionString: "redis:6379"
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
